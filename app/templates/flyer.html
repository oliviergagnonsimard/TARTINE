{% extends 'base.html' %}

{% block head %}
{% endblock %}

{% block body %}
<div id="lightbox" onclick="closeLightbox()" style="
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    cursor: zoom-out;
    user-select: none;
" draggable="false">
    <button onclick="event.stopPropagation(); changeImage(-1)" style="
        position: absolute; left: 20px;
        background: none; border: none;
        color: white; font-size: 48px;
        cursor: pointer;">◀</button>

    <img id="lightbox-img" style="max-width: 85%; max-height: 90%; border-radius: 10px;">

    <!-- ← Ajoute le compteur ici -->
    <div id="lightbox-counter" style="
        position: absolute; bottom: 20px;
        color: white; font-size: 18px;
        background: rgba(0,0,0,0.5);
        padding: 5px 15px;
        border-radius: 20px;
    "></div>

    <button onclick="event.stopPropagation(); changeImage(1)" style="
        position: absolute; right: 20px;
        background: none; border: none;
        color: white; font-size: 48px;
        cursor: pointer;">▶</button>
</div>
<div style="justify-content: center; display: flex; align-items: center; height: 150px; margin-bottom: 20px; position: relative;">
    <a href="{{ url_for('flyers') }}" style="position: absolute; left: 0; font-size: 36px; color:inherit">
        <i class="bi bi-arrow-left-circle"></i>
    </a>
    <img style="width: 250px; height: auto" src="{{ url_for('static', filename='logos-epiceries/' ~ store ~ '.png') }}">
</div>

{% for url in image_urls %}
<div style="display: flex; justify-content: space-evenly; align-items: center; width: 100%; height: 100%;">
    <div style="justify-content: center; display: flex; align-items: center;">
        <img style="width:90%; border-radius: 30px; cursor: zoom-in;"
             src="{{ url }}"
             onclick="openLightbox({{ loop.index0 * 2 }})">
    </div>
    {% if loop.index < image_urls|length %}
    <div style="justify-content: center; display: flex; align-items: center;">
        <img style="width:90%; border-radius: 30px; cursor: zoom-in;"
             src="{{ image_urls[loop.index] }}"
             onclick="openLightbox({{ loop.index0 * 2 + 1 }})">
    </div>
    {% endif %}
</div>
{% endfor %}
<script>
const allImages = {{ image_urls | tojson | safe }};
let currentIndex = 0;

function updateCounter() {
    document.getElementById("lightbox-counter").innerText = 
        `${currentIndex + 1} / ${allImages.length}`;
}

let isDragging = false;
let startX, startY, translateX = 0, translateY = 0;

const img = document.getElementById("lightbox-img");

img.addEventListener("mousedown", (e) => {
    e.preventDefault();
    e.stopPropagation();
    isDragging = true;
    startX = e.clientX - translateX;
    startY = e.clientY - translateY;
    img.style.cursor = "grabbing";
});

document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;
    translateX = e.clientX - startX;
    translateY = e.clientY - startY;
    img.style.transform = `scale(${zoomLevel}) translate(${translateX / zoomLevel}px, ${translateY / zoomLevel}px)`;
});

document.addEventListener("mouseup", () => {
    isDragging = false;
    img.style.cursor = "default";
});
img.addEventListener("click", (e) => {
    e.stopPropagation(); // ← empêche le click de fermer le lightbox
});

let zoomLevel = 1;
img.addEventListener("wheel", (e) => {
    e.preventDefault();
    
    const rect = img.getBoundingClientRect();
    const mouseX = e.clientX - rect.left - rect.width / 2;
    const mouseY = e.clientY - rect.top - rect.height / 2;
    
    const prevZoom = zoomLevel;
    zoomLevel += e.deltaY * -0.001;
    zoomLevel = Math.min(Math.max(zoomLevel, 1), 4);
    
    // Ajuste le translate pour zoomer vers la souris
    const zoomRatio = zoomLevel / prevZoom;
    translateX = mouseX - zoomRatio * (mouseX - translateX);
    translateY = mouseY - zoomRatio * (mouseY - translateY);
    
    // Reset translate si on est à zoom 1
    if (zoomLevel === 1) {
        translateX = 0;
        translateY = 0;
    }

    img.style.transform = `scale(${zoomLevel}) translate(${translateX / zoomLevel}px, ${translateY / zoomLevel}px)`;
});


function openLightbox(index) {
    zoomLevel = 1; // reset zoom à chaque ouverture
    document.getElementById("lightbox-img").style.transform = "scale(1)";
    currentIndex = index;
    document.getElementById("lightbox-img").src = allImages[currentIndex];
    document.getElementById("lightbox").style.display = "flex";
    updateCounter();
}

function changeImage(direction) {
    zoomLevel = 1; // reset zoom au changement d'image
    document.getElementById("lightbox-img").style.transform = "scale(1)";
    currentIndex += direction;
    if (currentIndex < 0) currentIndex = allImages.length - 1;
    if (currentIndex >= allImages.length) currentIndex = 0;
    document.getElementById("lightbox-img").src = allImages[currentIndex];
    updateCounter();
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}

function resetImage() {
    zoomLevel = 1;
    translateX = 0;
    translateY = 0;
    img.style.transform = "scale(1) translate(0px, 0px)";
}

document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowRight") changeImage(1);
    if (e.key === "ArrowLeft") changeImage(-1);
});
</script>
{% endblock %}

{% extends 'base.html' %}

{% block head %}
<style>
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

* { box-sizing: border-box; }

.page-header { animation: fadeSlideIn 0.5s ease both; }
.create-body { animation: fadeSlideIn 0.5s ease 0.08s both; }

/* ── Header ── */
.page-header {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 28px; flex-wrap: wrap; padding-top: 20px;
}
.back-btn {
  width: 42px; height: 42px; border-radius: 99px; flex-shrink: 0;
  background: #1a1a1a; border: 0.5px solid #2a2a2a; color: #aaa;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; text-decoration: none;
  transition: border-color 0.2s, color 0.2s;
}
.back-btn:hover { border-color: #444; color: #fff; }

.page-title {
  font-size: 36px; font-weight: 700; letter-spacing: -1.5px;
  color: #fff; line-height: 1;
}
.page-title span { color: #e91e8c; }

/* ── Layout ── */
.create-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  align-items: start;
}
@media (max-width: 800px) { .create-body { grid-template-columns: 1fr; } }

/* ── Cards ── */
.card {
  background: #111; border: 0.5px solid #222; border-radius: 14px;
  padding: 22px; position: relative; overflow: visible;
}
.card::before {
  content: ""; position: absolute; top: 0; right: 0;
  width: 100px; height: 100px;
  background: radial-gradient(circle, rgba(233,30,140,0.06), transparent 70%);
  pointer-events: none;
}
.card-head {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: #444; margin-bottom: 18px;
  display: flex; align-items: center; gap: 8px;
}

/* ── Champs ── */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.field label {
  font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #555;
}
.field input[type="text"],
.field input[type="number"],
.field textarea,
.field select {
  background: #1a1a1a; border: 0.5px solid #2a2a2a; color: #ccc;
  border-radius: 8px; padding: 10px 12px; font-size: 13px;
  width: 100%; outline: none; transition: border-color 0.2s;
  font-family: inherit;
}
.field input:focus,
.field textarea:focus,
.field select:focus { border-color: #e91e8c; }
.field textarea { min-height: 160px; resize: vertical; line-height: 1.7; }

/* ── Ingrédients ── */
.ing-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.ing-row {
  display: flex; gap: 8px; align-items: center;
}
.ing-row input,
.ing-row select {
  background: #1a1a1a; border: 0.5px solid #2a2a2a; color: #ccc;
  border-radius: 8px; padding: 9px 10px; font-size: 13px;
  outline: none; transition: border-color 0.2s; font-family: inherit;
}
.ing-row input:focus,
.ing-row select:focus { border-color: #e91e8c; }
.ing-nom    { flex: 2; }
.ing-qty    { flex: 1; min-width: 70px; }
.ing-unite  { flex: 1.2; min-width: 90px; }

.ing-remove-btn {
  background: none; border: none; color: #555; font-size: 16px;
  cursor: pointer; flex-shrink: 0; transition: color 0.2s;
}
.ing-remove-btn:hover { color: #e91e8c; }

.btn-add-ing {
  background: none; border: 0.5px dashed #2a2a2a; color: #555;
  padding: 8px 14px; border-radius: 8px; font-size: 12px;
  cursor: pointer; transition: border-color 0.2s, color 0.2s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-add-ing:hover { border-color: #444; color: #aaa; }

/* ── Bouton submit ── */
.submit-wrap {
  grid-column: 1 / -1;
  display: flex; justify-content: flex-end; align-items: center; gap: 12px;
  padding-top: 4px;
}
.btn-pink {
  background: #d32f89; color: #fff; border: none;
  padding: 11px 24px; border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
  transition: background 0.2s;
}
.btn-pink:hover { background: #e91e8c; }

.btn-pill-cancel {
  background: #1a1a1a; border: 0.5px solid #2a2a2a; color: #aaa;
  padding: 11px 20px; border-radius: 8px; font-size: 14px; cursor: pointer;
  text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
  transition: border-color 0.2s, color 0.2s;
}
.btn-pill-cancel:hover { border-color: #444; color: #fff; }

.error-msg { color: #ED93B1; font-size: 13px; }

/* ── Autocomplete ── */
.autocomplete-wrapper { position: relative; flex: 2; }
.autocomplete-dropdown {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 99;
  background: #1a1a1a; border: 0.5px solid #333; border-radius: 8px;
  margin-top: 4px; overflow: hidden; display: none;
}
.autocomplete-item {
  padding: 9px 12px; font-size: 13px; color: #ccc; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  transition: background 0.15s;
}
.autocomplete-item:hover { background: #222; }
.autocomplete-category {
  font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px;
}

/* ── Unite dropdown custom ── */
.unite-wrapper { position: relative; flex: 1.2; min-width: 90px; }
.unite-selected {
  background: #1a1a1a; border: 0.5px solid #2a2a2a; color: #ccc;
  border-radius: 8px; padding: 9px 10px; font-size: 13px;
  cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  transition: border-color 0.2s; user-select: none;
}
.unite-selected:hover { border-color: #444; }
.unite-selected.open { border-color: #e91e8c; }
.unite-dropdown {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
  background: #1a1a1a; border: 0.5px solid #333; border-radius: 8px;
  margin-top: 4px; overflow: hidden; display: none;
}
.unite-dropdown.open { display: block; }
.unite-option {
  padding: 8px 12px; font-size: 13px; color: #ccc;
  cursor: pointer; transition: background 0.15s;
}
.unite-option:hover { background: #222; color: #fff; }
.unite-option.active { color: #e91e8c; }
/* hidden input pour le form */
.unite-hidden { display: none; }

/* ── Qty input custom ── */
.qty-wrapper {
  display: flex; align-items: center;
  background: #1a1a1a; border: 0.5px solid #2a2a2a;
  border-radius: 8px; overflow: hidden;
  flex: 1; min-width: 70px;
}
.qty-wrapper:focus-within { border-color: #e91e8c; }
.qty-btn {
  background: none; border: none; color: #555;
  padding: 0 10px; height: 100%; cursor: pointer;
  font-size: 16px; transition: color 0.2s;
  display: flex; align-items: center;
}
.qty-btn:hover { color: #e91e8c; }
.qty-input {
  background: none; border: none; color: #ccc;
  font-size: 13px; text-align: center;
  width: 100%; outline: none; padding: 9px 0;
  -moz-appearance: textfield;
}
.qty-input::-webkit-outer-spin-button,
.qty-input::-webkit-inner-spin-button { -webkit-appearance: none; }
</style>
{% endblock %}

{% block body %}

<!-- ── Header ── -->
<div class="page-header">
  <a href="{{ url_for('recipes') }}" class="back-btn">
    <i class="bi bi-arrow-left"></i>
  </a>
  <div>
    <div class="page-title">Nouvelle <span>recette</span></div>
  </div>
</div>

<!-- ── Formulaire ── -->
<form action="/recipes/create" method="POST">
  <div class="create-body">

    <!-- Colonne gauche : infos générales -->
    <div style="display: flex; flex-direction: column; gap: 16px;">

      <div class="card">
        <div class="card-head"><i class="bi bi-info-circle"></i> Informations</div>

        <div class="field">
          <label>Nom de la recette</label>
          <input type="text" name="nom" placeholder="ex. Poulet rôti aux herbes" required>
        </div>

        <div class="field">
          <label>Portions</label>
          <input type="number" name="portions" value="4" min="1">
        </div>
      </div>

      <div class="card">
        <div class="card-head"><i class="bi bi-journal-text"></i> Instructions</div>
        <div class="field">
          <textarea name="instructions" placeholder="Décrivez les étapes de préparation…"></textarea>
        </div>
      </div>

    </div>

    <!-- Colonne droite : ingrédients -->
    <div class="card">
      <div class="card-head"><i class="bi bi-basket"></i> Ingrédients</div>

      <div class="ing-list" id="ingredients-list"></div>

      <button type="button" onclick="addIngredient()" class="btn-add-ing">
        <i class="bi bi-plus"></i> Ajouter un ingrédient
      </button>
    </div>

    <!-- Actions -->
    <div class="submit-wrap">
      {% if error %}<span class="error-msg">{{ error }}</span>{% endif %}
      <a href="{{ url_for('recipes') }}" class="btn-pill-cancel">Annuler</a>
      <button type="submit" class="btn-pink">
        <i class="bi bi-check-lg"></i> Créer la recette
      </button>
    </div>

  </div>
</form>

<script>
const UNITES = ['kg','g','L','ml','tasse','c. à soupe','c. à thé','unité','pincée'];

function addIngredient(defaultUnite = 'unité') {
  const list = document.getElementById('ingredients-list');
  const div  = document.createElement('div');
  div.className = 'ing-row';

  const uniteOptions = UNITES.map(u => 
    `<div class="unite-option ${u === defaultUnite ? 'active' : ''}" data-value="${u}">${u}</div>`
  ).join('');

  div.innerHTML = `
    <div class="autocomplete-wrapper">
      <input type="text" name="ingredient_nom" placeholder="Nom" class="ing-nom" autocomplete="off">
      <div class="autocomplete-dropdown"></div>
    </div>
    <div class="qty-wrapper">
      <button type="button" class="qty-btn qty-minus">−</button>
      <input type="number" name="ingredient_quantite" placeholder="1" class="ing-qty qty-input" step="0.1" min="0">
      <button type="button" class="qty-btn qty-plus">＋</button>
    </div>
    <div class="unite-wrapper">
      <div class="unite-selected">
        <span class="unite-label">${defaultUnite}</span>
        <i class="bi bi-chevron-down" style="font-size:10px;"></i>
      </div>
      <div class="unite-dropdown">
        ${uniteOptions}
      </div>
      <input type="hidden" name="ingredient_unite" class="unite-hidden" value="${defaultUnite}">
    </div>
    <button type="button" onclick="this.closest('.ing-row').remove()" class="ing-remove-btn">
      <i class="bi bi-x-circle"></i>
    </button>`;

  list.appendChild(div);

  // Setup unite dropdown
  const uniteSelected = div.querySelector('.unite-selected');
  const uniteDropdown = div.querySelector('.unite-dropdown');
  const uniteHidden   = div.querySelector('.unite-hidden');
  const uniteLabel    = div.querySelector('.unite-label');

  uniteSelected.addEventListener('click', (e) => {
    e.stopPropagation();
    uniteSelected.classList.toggle('open');
    uniteDropdown.classList.toggle('open');
  });

  uniteDropdown.querySelectorAll('.unite-option').forEach(opt => {
    opt.addEventListener('click', () => {
      const val = opt.dataset.value;
      uniteLabel.textContent = val;
      uniteHidden.value = val;
      uniteDropdown.querySelectorAll('.unite-option').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      uniteSelected.classList.remove('open');
      uniteDropdown.classList.remove('open');
    });
  });

  document.addEventListener('click', () => {
    uniteSelected.classList.remove('open');
    uniteDropdown.classList.remove('open');
  });

  // Setup autocomplete
  const input    = div.querySelector('input[name="ingredient_nom"]');
  const dropdown = div.querySelector('.autocomplete-dropdown');
  setupAutocomplete(input, dropdown);

  // Setup qty buttons
const qtyInput = div.querySelector('.qty-input');
  div.querySelector('.qty-minus').addEventListener('click', () => {
    const val = parseFloat(qtyInput.value) || 0;
    qtyInput.value = Math.max(0, Math.round((val - 0.5) * 10) / 10);
  });
  div.querySelector('.qty-plus').addEventListener('click', () => {
    const val = parseFloat(qtyInput.value) || 0;
    qtyInput.value = Math.round((val + 0.5) * 10) / 10;
  });

  input.focus();
}

function setupAutocomplete(input, dropdown) {
  let debounceTimer;

  input.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const q = input.value.trim();
    
    if (q.length < 2) {
      dropdown.style.display = 'none';
      return;
    }

    debounceTimer = setTimeout(async () => {
      const res = await fetch(`/ingredients/search?q=${encodeURIComponent(q)}`);
      const items = await res.json();
      
      if (items.length === 0) {
        dropdown.style.display = 'none';
        return;
      }

      dropdown.innerHTML = items.map(item => `
        <div class="autocomplete-item" data-nom="${item.nom}">
          <span>${item.nom}</span>
          <span class="autocomplete-category">${item.category || ''}</span>
        </div>
      `).join('');

      dropdown.querySelectorAll('.autocomplete-item').forEach(el => {
        el.addEventListener('click', () => {
          input.value = el.dataset.nom;
          dropdown.style.display = 'none';
        });
      });

      dropdown.style.display = 'block';
    }, 250);
  });

  document.addEventListener('click', (e) => {
    if (!input.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.style.display = 'none';
    }
  });
}

addIngredient();
</script>
{% endblock %}

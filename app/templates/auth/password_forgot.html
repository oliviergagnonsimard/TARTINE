{% extends 'base.html' %}

{% block head %}
<style>
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

* { box-sizing: border-box; }
#main { padding: 0; }

.auth-wrap {
  animation: fadeSlideIn 0.5s ease both;
  min-height: 70vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding-top: 40px;
}

.auth-card {
  background: #111; border: 0.5px solid #222; border-radius: 14px;
  padding: 36px 32px; width: 100%; max-width: 420px;
  position: relative; overflow: hidden;
}
.auth-card::before {
  content: ""; position: absolute; top: 0; right: 0;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(233,30,140,0.07), transparent 70%);
  pointer-events: none;
}

.auth-title {
  font-size: 28px; font-weight: 700; letter-spacing: -1px;
  color: #fff; margin-bottom: 6px;
}
.auth-title span { color: #e91e8c; }
.auth-sub { font-size: 13px; color: #555; margin-bottom: 28px; }

.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
.field label {
  font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #555;
}
.field input {
  background: #1a1a1a; border: 0.5px solid #2a2a2a; color: #ccc;
  border-radius: 8px; padding: 11px 14px; font-size: 13px;
  width: 100%; outline: none; transition: border-color 0.2s;
}
.field input:focus { border-color: #e91e8c; }

.btn-pink {
  background: #d32f89; color: #fff; border: none;
  padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; width: 100%; transition: background 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-pink:hover { background: #e91e8c; }

.msg-error   { font-size: 13px; color: #ED93B1; margin-top: 14px; text-align: center; }
.msg-success { font-size: 13px; color: #5DCAA5;  margin-top: 14px; text-align: center; }
</style>
{% endblock %}

{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">Mot de <span>passe oublié</span></div>
    <div class="auth-sub">On vous enverra un lien de réinitialisation.</div>

    <form action="/forgot-password" method="POST">
      <div class="field">
        <label>Courriel</label>
        <input type="email" name="email" placeholder="votre@courriel.com" required>
      </div>
      <button type="submit" class="btn-pink">
        <i class="bi bi-send"></i> Envoyer le lien
      </button>
      {% if error %}  <p class="msg-error">{{ error }}</p>{% endif %}
      {% if success %}<p class="msg-success">{{ success }}</p>{% endif %}
    </form>
  </div>
</div>
{% endblock %}

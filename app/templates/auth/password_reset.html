{% extends 'base.html' %}
{% block body %}
<h3 style="font-weight: bold; font-size: 50px; text-align: center; padding-bottom: 30px;">Nouveau mot de passe</h3>

<form action="/reset-password/{{ token }}" method="POST">
  <div style="display:flex; flex-direction: column; align-items: center; gap: 15px; padding-right: 5%;">
    <div style="display:flex; gap:10px;">
      <label style="width:200px; text-align: right;">Nouveau mot de passe</label>
      <input type="password" name="password" style="width: 300px;" required>
    </div>
    <div style="display:flex; gap:10px;">
      <label style="width:200px; text-align: right;">Confirmer</label>
      <input type="password" name="confirm" style="width: 300px;" required>
    </div>
    <button type="submit" class="btn btn-primary">Confirmer</button>
    {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
  </div>
</form>
{% endblock %}
